<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${student.id != null} ? 'Chỉnh Sửa Sinh Viên' : 'Thêm Sinh Viên'"></title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input[type="text"], input[type="email"], input[type="number"] { width: 300px; padding: 8px; }
    </style>
</head>
<body>
    <h1 th:text="${student.id != null} ? 'Chỉnh Sửa Sinh Viên' : 'Thêm Mới Sinh Viên'"></h1>
    
    <form action="#" th:action="@{/students/save}" th:object="${student}" method="POST">
        <input type="hidden" th:field="*{id}" />
        
        <div class="form-group">
            <label>Họ và Tên:</label>
            <input type="text" th:field="*{name}" required />
        </div>
        
        <div class="form-group">
            <label>Email:</label>
            <input type="email" th:field="*{email}" required />
        </div>
        
        <div class="form-group">
            <label>Tuổi:</label>
            <input type="number" th:field="*{age}" required />
        </div>
        
        <button type="submit" style="padding: 10px 20px; background-color: #007bff; color: white; border: none;">Lưu</button>
        <a href="/students" style="margin-left: 10px;">Hủy</a>
    </form>
</body>
</html>
